naftiko: 1.0.0-alpha2
info:
  label: NPR Identity Service — Identity
  description: 'NPR Identity Service — Identity. 4 operations. Lead operation: NPR Update the following status of the logged-in
    user for a particular aggregation. Self-contained Naftiko capability covering one Npr business surface.'
  tags:
  - Npr
  - Identity
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NPR_API_KEY: NPR_API_KEY
capability:
  consumes:
  - type: http
    namespace: identity-identity
    baseUri: https://identity.api.npr.org
    description: NPR Identity Service — Identity business capability. Self-contained, no shared references.
    resources:
    - name: v2-following
      path: /v2/following
      operations:
      - name: postfollowing
        method: POST
        description: NPR Update the following status of the logged-in user for a particular aggregation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
          description: Your access token from the Authorization Service. Should start with `Bearer`, followed by a space,
            followed by the token.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-stations
      path: /v2/stations
      operations:
      - name: updatestations
        method: PUT
        description: NPR Update the logged-in user's favorite station(s)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
          description: Your access token from the Authorization Service. Should start with `Bearer`, followed by a space,
            followed by the token.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v2-user
      path: /v2/user
      operations:
      - name: getuser
        method: GET
        description: NPR Get the latest state information about the logged-in user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
          description: Your access token from the Authorization Service. Should start with `Bearer`, followed by a space,
            followed by the token.
          required: true
      - name: deleteuser
        method: DELETE
        description: NPR Delete the user's account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
          description: Your access token from the Authorization Service. Should start with `Bearer`, followed by a space,
            followed by the token.
          required: true
    authentication:
      type: bearer
      token: '{{env.NPR_API_KEY}}'
  exposes:
  - type: rest
    namespace: identity-identity-rest
    port: 8080
    description: REST adapter for NPR Identity Service — Identity. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/following
      name: v2-following
      description: REST surface for v2-following.
      operations:
      - method: POST
        name: postfollowing
        description: NPR Update the following status of the logged-in user for a particular aggregation
        call: identity-identity.postfollowing
        with:
          Authorization: rest.Authorization
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/stations
      name: v2-stations
      description: REST surface for v2-stations.
      operations:
      - method: PUT
        name: updatestations
        description: NPR Update the logged-in user's favorite station(s)
        call: identity-identity.updatestations
        with:
          Authorization: rest.Authorization
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/user
      name: v2-user
      description: REST surface for v2-user.
      operations:
      - method: GET
        name: getuser
        description: NPR Get the latest state information about the logged-in user
        call: identity-identity.getuser
        with:
          Authorization: rest.Authorization
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteuser
        description: NPR Delete the user's account
        call: identity-identity.deleteuser
        with:
          Authorization: rest.Authorization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: identity-identity-mcp
    port: 9090
    transport: http
    description: MCP adapter for NPR Identity Service — Identity. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: npr-update-following-status-logged
      description: NPR Update the following status of the logged-in user for a particular aggregation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: identity-identity.postfollowing
      with:
        Authorization: tools.Authorization
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: npr-update-logged-user-s-favorite
      description: NPR Update the logged-in user's favorite station(s)
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: identity-identity.updatestations
      with:
        Authorization: tools.Authorization
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: npr-get-latest-state-information
      description: NPR Get the latest state information about the logged-in user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: identity-identity.getuser
      with:
        Authorization: tools.Authorization
      outputParameters:
      - type: object
        mapping: $.
    - name: npr-delete-user-s-account
      description: NPR Delete the user's account
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: identity-identity.deleteuser
      with:
        Authorization: tools.Authorization
      outputParameters:
      - type: object
        mapping: $.

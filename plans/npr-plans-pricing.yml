specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: NPR
providerId: npr
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Media
  - News
  - Radio
description: NPR's developer platform (dev.npr.org) is a B2B program for NPR member stations, station
  groups, and approved third-party partners. There is no public, self-serve pricing or commercial plan;
  access is granted via the developer registration flow with NPR Digital Services and is governed by
  the NPR API Terms of Use rather than published tiers. Treat this as a partner/credentialed-access program.
notes: dev.npr.org and api.npr.org pricing/terms pages were not directly fetchable during reconciliation;
  the public posture is partner credentialing rather than tiered SaaS. Update if NPR publishes a self-serve
  pricing page.
sources:
  - https://dev.npr.org/
  - https://dev.npr.org/guide/services/listening
plans:
  - id: npr-developer-program
    name: NPR Developer Program
    type: enterprise
    description: Credentialed access for member stations, station partners, and approved third-party developers.
      Free of charge but gated by approval and content licensing terms.
    entries:
      - label: API access
        description: Programmatic access to NPR Listening, Station Finder, Identity, and Authorization
          APIs subject to approval and Terms of Use
        name: api_access
        type: subscription
        metric: contract
        limit: -1
        timeFrame: usage
        geo: US
        domains:
          - https://listening.api.npr.org/
          - https://station.api.npr.org/
          - https://identity.api.npr.org/
          - https://authorization.api.npr.org/
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Developer registration via dev.npr.org
      - name: OAuth 2.0 client credentialing
      - name: NPR API Terms of Use compliance
      - name: NPR Listening
      - name: NPR Station Finder
      - name: NPR Identity
      - name: NPR Authorization
maintainers:

specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: NPR
providerId: npr
publisherName: National Public Radio, Inc.
serviceCategory: Media / Public Broadcasting
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Media
  - News
  - Radio
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for NPR: API access is free under a partner/credentialed program rather
  than a paid SaaS contract. Cost dimensions are operational (engineering integration time, content licensing
  obligations) rather than per-call invoicing.'
notes: NPR does not invoice API consumers under the public developer program; the FinOps surface is implementation
  cost and content-licensing compliance, not vendor spend.
sources:
  - https://dev.npr.org/
principles:
  - name: Visibility
    description: There is no NPR invoice for API usage. Track per-OAuth-client request volumes and content
      airing/streaming counts internally for licensing and quota-of-fair-use reporting.
  - name: Allocation
    description: Allocate API usage to the consuming app or station group via the OAuth client_id.
  - name: Optimization
    description: Cache NPR Listening recommendations and Station Finder responses; respect upstream content
      TTLs to minimize redundant calls and stay within fair use.
  - name: Accountability
    description: Each NPR developer account has an owner of record. Assign per-app responsibility for
      compliance with the NPR API Terms of Use and content rights, and for renewing OAuth credentials.
billingModel:
  pricingCategory: Free / Partner Program
  billingFrequency: None
  billingCurrency: USD
  chargeCategories:
    - Usage
  chargeFrequency: None
focusColumns:
  ServiceName: NPR
  ServiceCategory: Media / Public Broadcasting
  ProviderName: NPR
  PublisherName: National Public Radio, Inc.
  InvoiceIssuerName: N/A (free partner program)
  PricingCategory: Free
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of API requests across all NPR developer surfaces (operationally tracked, not invoiced)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - oauth_client
      - endpoint
  - name: audio_recommendations_served
    description: Listening API audio recommendations delivered (relevant to content licensing reporting)
    unit: recommendation
    aggregation: sum
  - name: station_lookups
    description: Station Finder lookups by zip/geo
    unit: lookup
    aggregation: sum
apis:
  - name: NPR Listening
    baseURL: https://listening.api.npr.org/
    tags:
      - Audio
      - Listening
    serviceName: NPR Listening
    serviceCategory: Media
  - name: NPR Station Finder
    baseURL: https://station.api.npr.org/
    tags:
      - Stations
    serviceName: NPR Station Finder
    serviceCategory: Media
  - name: NPR Identity
    baseURL: https://identity.api.npr.org/
    tags:
      - Identity
      - Users
    serviceName: NPR Identity
    serviceCategory: Media
  - name: NPR Authorization
    baseURL: https://authorization.api.npr.org/
    tags:
